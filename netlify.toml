[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION            = "18"
  NEXT_TELEMETRY_DISABLED = "1"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors 'self' https://webwill.vercel.app https://*.webwill.com http://localhost:3000"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
